<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Generator Tool</title>
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RFFDVWTJM3"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-RFFDVWTJM3');
    </script>
    <!-- Use Tailwind CSS via CDN for easy WordPress embedding -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Noto Sans JP -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* Custom styles to prevent WordPress theme conflicts */
        .tf-container {
            font-family: 'Noto Sans JP', sans-serif;
            font-style: normal !important;
        }
        * {
            font-style: normal !important;
        }
        .tf-loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: tf-spin 1s linear infinite;
        }
        @keyframes tf-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="tf-container max-w-2xl mx-auto p-6 bg-white rounded-xl shadow-sm border border-gray-100 mt-8">
    
    <!-- Tool Header (Will be dynamically injected by generator) -->
    <div class="mb-6 border-b pb-4">
        <h2 id="tf-title" class="text-2xl font-bold text-gray-800">退職届作成支援ツール</h2>
        <p id="tf-description" class="text-gray-600 text-sm mt-2">適切なフォーマットと構成案により、円滑な退職手続きを支援します。</p>
    </div>

    <!-- Tool Form -->
    <div id="tf-form-area" class="space-y-4">
        <!-- Dynamic fields will be here. For this MVP, we use hardcoded fields for the sample tool -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">退職理由（例：キャリアアップ、体調不良、人間関係など）</label>
            <input type="text" id="tf-input-reason" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" placeholder="キャリアアップのため" required>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">現在の役職 / 職種</label>
            <input type="text" id="tf-input-role" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" placeholder="営業部 リーダー" required>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">会社への感謝の度合い（任意）</label>
            <select id="tf-input-gratitude" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                <option value="非常に感謝している">非常に感謝している（円満アピール）</option>
                <option value="普通">普通（事務的）</option>
                <option value="全くなし">全くなし（極力事務的・冷淡に）</option>
            </select>
        </div>

        <button id="tf-generate-btn" class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-md transition duration-150 flex justify-center items-center">
            <span>AIで退職届を生成する</span>
            <div id="tf-loading" class="tf-loader ml-3 hidden"></div>
        </button>
    </div>

    <!-- Error Area -->
    <div id="tf-error-area" class="hidden mt-4 p-4 bg-red-50 text-red-700 rounded-md text-sm">
        エラーが発生しました。もう一度お試しください。
    </div>

    <!-- Result Area -->
    <div id="tf-result-area" class="hidden mt-6 space-y-4">
        <h3 class="text-lg font-bold text-gray-800 border-l-4 border-blue-500 pl-2">生成結果</h3>
        <div class="bg-gray-50 p-4 rounded-md border border-gray-200">
            <pre id="tf-output" class="whitespace-pre-wrap text-sm text-gray-700 font-sans leading-relaxed"></pre>
        </div>
        <button id="tf-copy-btn" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-2 px-4 rounded-md transition duration-150">
            結果をコピーする
        </button>

        <!-- Affiliate / Monetization Block -->
        <div class="mt-8 p-5 bg-gradient-to-r from-blue-50 to-indigo-50 border border-blue-100 rounded-lg text-center">
            <h4 class="font-bold text-gray-800 mb-2">💡 確実でトラブルのない退職をご希望ですか？</h4>
            <p class="text-sm text-gray-600 mb-4">上司に引き留められる不安がある場合や、即日退職したい場合は、弁護士監修の「退職代行サービス」の利用が確実です。</p>
            <!-- A8.net / Affiliate link placeholder -->
            <a href="#affiliate-link-here" target="_blank" class="inline-block bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-6 rounded-full shadow-md transition duration-150">
                おすすめの退職代行サービスを見る ↗
            </a>
        </div>
    </div>
</div>

<script src="./script.js"></script>
</body>
</html>
