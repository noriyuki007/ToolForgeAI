<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ツール一覧 | ToolForge AI</title>
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RFFDVWTJM3"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-RFFDVWTJM3');
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon.png" type="image/png">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; font-style: normal !important; }
        * { font-style: normal !important; }
        .mesh-gradient {
            background-color: #ffffff;
            background-image: radial-gradient(at 0% 0%, hsla(217,100%,98%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(210,100%,99%,1) 0, transparent 50%);
        }
        .premium-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid #E2E8F0;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .premium-card:hover {
            transform: translateY(-5px);
            border-color: #2563EB;
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="min-h-screen mesh-gradient flex flex-col">
    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl border-b border-slate-200/60">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="/" class="text-2xl font-black tracking-tighter text-slate-900">ToolForge<span class="text-blue-600">AI</span></a>
            <div class="hidden md:flex items-center space-x-8 text-sm font-bold text-slate-600 uppercase tracking-widest">
                <a href="/" class="hover:text-blue-600 transition-colors">トップ</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow pt-44 pb-32 px-6">
        <div class="max-w-7xl mx-auto">
            <div class="mb-16">
                <h1 class="text-4xl font-black text-slate-900 mb-4 tracking-tight">ツール一覧</h1>
                <p class="text-slate-500 font-medium">業務効率を最大化する特化型AIツール</p>
            </div>

            <!-- Search & Filters -->
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-8 mb-16">
                <div class="relative w-full md:w-96 group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <input type="text" id="tool-search" placeholder="キーワードで検索..." class="w-full pl-12 pr-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all shadow-sm">
                </div>
                <div id="category-filters" class="flex flex-wrap gap-2">
                    <button data-category="all" class="category-btn flex items-center px-4 py-2 text-sm font-bold text-blue-600 bg-blue-50 rounded-lg border border-blue-100">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                        すべて
                    </button>
                    <button data-category="writing" class="category-btn flex items-center px-4 py-2 text-sm font-bold text-slate-500 hover:text-slate-900">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        文章作成
                    </button>
                    <button data-category="business" class="category-btn flex items-center px-4 py-2 text-sm font-bold text-slate-500 hover:text-slate-900">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        実務効率化
                    </button>
                    <button data-category="creative" class="category-btn flex items-center px-4 py-2 text-sm font-bold text-slate-500 hover:text-slate-900">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        制作・デザイン
                    </button>
                </div>
            </div>

            <div id="tools-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Skeletons -->
                <div class="animate-pulse bg-slate-50 border border-slate-100 rounded-2xl h-[280px]"></div>
                <div class="animate-pulse bg-slate-50 border border-slate-100 rounded-2xl h-[280px]"></div>
                <div class="animate-pulse bg-slate-50 border border-slate-100 rounded-2xl h-[280px]"></div>
            </div>

            <div id="no-results" class="hidden py-32 text-center">
                <h3 class="text-xl font-bold text-slate-900 mb-2">該当するツールがありません</h3>
                <p class="text-slate-500">条件を変更してお試しください。</p>
            </div>
        </div>
    </main>

    <footer class="bg-slate-900 py-12 px-6 text-white text-center">
        <span class="text-xl font-black tracking-tighter mb-4 block">ToolForge AI</span>
        <div class="flex justify-center space-x-8 text-sm font-medium text-slate-400 mb-8">
            <a href="privacy.html" class="hover:text-white transition-colors">プライバシーポリシー</a>
            <a href="terms.html" class="hover:text-white transition-colors">利用規約</a>
        </div>
        <p class="text-xs font-bold text-slate-500 uppercase tracking-widest">&copy; 2026 ToolForge AI. All rights reserved.</p>
    </footer>

    <script>
        let allTools = [];
        let currentCategory = 'all';

        const categoryIcons = {
            writing: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>',
            business: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>',
            creative: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>',
            meeting: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>',
            default: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>'
        };

        function getCategoryByTool(tool) {
            const title = tool.title.rendered.toLowerCase();
            if (title.includes('メール') || title.includes('文') || title.includes('書') || title.includes('記事') || title.includes('報告')) return 'writing';
            if (title.includes('会議') || title.includes('議事録')) return 'meeting';
            if (title.includes('営業') || title.includes('ビジネス') || title.includes('企画') || title.includes('分析') || title.includes('効率') || title.includes('プロセス') || title.includes('リソース') || title.includes('管理')) return 'business';
            if (title.includes('画像') || title.includes('デザイン') || title.includes('ロゴ') || title.includes('制作')) return 'creative';
            return 'default';
        }

        async function fetchTools() {
            try {
                const response = await fetch('/wp-json/wp/v2/posts?per_page=100');
                allTools = await response.json();
                renderTools(allTools);
            } catch (error) {
                console.error(error);
            }
        }

        function renderTools(tools) {
            const grid = document.getElementById('tools-grid');
            const noResults = document.getElementById('no-results');
            grid.innerHTML = '';

            const query = document.getElementById('tool-search').value.toLowerCase();
            const filtered = tools.filter(tool => {
                const category = getCategoryByTool(tool);
                const title = tool.title.rendered.toLowerCase();
                const matchesSearch = title.includes(query);
                const matchesCategory = currentCategory === 'all' || category === currentCategory;
                return matchesSearch && matchesCategory;
            });

            if (filtered.length === 0) {
                grid.classList.add('hidden');
                noResults.classList.remove('hidden');
                return;
            }

            grid.classList.remove('hidden');
            noResults.classList.add('hidden');

            filtered.forEach((tool, index) => {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = tool.excerpt.rendered;
                let excerpt = tempDiv.textContent || tempDiv.innerText || '';

                const category = getCategoryByTool(tool);
                const iconPath = categoryIcons[category] || categoryIcons.default;
                const card = document.createElement('a');
                card.href = `tool.html?id=${tool.id}`;
                card.className = `premium-card p-8 rounded-2xl flex flex-col justify-between`;
                card.innerHTML = `
                    <div>
                        <div class="w-12 h-12 bg-slate-50 rounded-xl flex items-center justify-center mb-6 border border-slate-100">
                            <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">${iconPath}</svg>
                        </div>
                        <h3 class="text-xl font-bold text-slate-900 mb-4 tracking-tight">${tool.title.rendered}</h3>
                        <p class="text-slate-500 font-medium text-sm leading-relaxed mb-8">${excerpt}</p>
                    </div>
                    <div class="flex items-center justify-between mt-auto pt-6 border-t border-slate-50">
                        <span class="text-[10px] font-bold uppercase tracking-widest text-blue-600 bg-blue-50 px-3 py-1 rounded-md">無料</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        document.getElementById('tool-search').addEventListener('input', () => renderTools(allTools));

        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-btn').forEach(b => {
                    b.classList.remove('text-blue-600', 'bg-blue-50', 'border-blue-100');
                    b.classList.add('text-slate-500');
                });
                btn.classList.add('text-blue-600', 'bg-blue-50', 'border-blue-100');
                currentCategory = btn.dataset.category;
                renderTools(allTools);
            });
        });

        document.addEventListener('DOMContentLoaded', fetchTools);
    </script>
</body>
</html>
