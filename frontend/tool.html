<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolForge AI | 読み込み中...</title>
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RFFDVWTJM3"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-RFFDVWTJM3');
    </script>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Noto Sans JP -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" href="favicon.png" type="image/png">
    
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #ffffff;
            color: #0F172A;
            -webkit-font-smoothing: antialiased;
            font-style: normal !important;
        }

        /* Abolish italics globally */
        * {
            font-style: normal !important;
        }

        /* Mesh Gradient Background */
        .mesh-gradient {
            background-color: #ffffff;
            background-image: 
                radial-gradient(at 0% 0%, hsla(217,100%,98%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(210,100%,99%,1) 0, transparent 50%);
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen mesh-gradient">

    <!-- ナビゲーション -->
    <nav class="bg-white/80 backdrop-blur-xl border-b border-slate-200/60 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <a href="/" class="text-xl font-black tracking-tighter text-slate-900">ToolForge<span class="text-blue-600">AI</span></a>
            </div>
            <a href="/" class="text-xs font-bold text-slate-500 hover:text-blue-600 uppercase tracking-widest flex items-center transition-colors">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                一覧に戻る
            </a>
        </div>
    </nav>

    <!-- ツール描画エリア -->
    <div id="tool-render-area" class="py-12 md:py-20 fade-in">
        <div class="flex flex-col justify-center items-center h-96">
            <div class="relative">
                <div class="w-12 h-12 border-4 border-blue-50 rounded-full"></div>
                <div class="w-12 h-12 border-4 border-blue-600 rounded-full border-t-transparent animate-spin absolute top-0"></div>
            </div>
            <span class="mt-6 text-slate-400 font-bold uppercase tracking-widest text-[10px]">システム準備中...</span>
        </div>
    </div>

    <!-- 関連ツール描画エリア -->
    <div id="related-tools-area" class="max-w-7xl mx-auto px-6 py-12 hidden fade-in">
        <h3 class="text-2xl font-bold text-slate-900 mb-8 tracking-tight">他のビジネス支援ツール</h3>
        <div id="related-tools-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </div>

    <!-- フッター -->
    <footer class="bg-slate-900 py-20 px-6 text-white overflow-hidden relative">
        <div class="max-w-7xl mx-auto relative z-10 text-center">
            <div class="flex items-center justify-center space-x-3 mb-8">
                <span class="text-xl font-black tracking-tighter">ToolForge AI</span>
            </div>
            <p class="text-slate-400 max-w-sm mx-auto leading-relaxed font-medium mb-12">
                実務に特化したAIソリューションを通じて、ビジネスの生産性を最大化し、付加価値の高い業務に集中できる環境を支援します。
            </p>
            <div class="flex justify-center space-x-8 text-sm font-medium text-slate-400 mb-12">
                <a href="privacy.html" class="hover:text-white transition-colors">プライバシーポリシー</a>
                <a href="terms.html" class="hover:text-white transition-colors">利用規約</a>
            </div>
            <div class="pt-8 border-t border-white/5 text-xs font-bold text-slate-500 uppercase tracking-widest">
                &copy; 2026 ToolForge AI. All rights reserved.
            </div>
        </div>
    </footer>

    <script>
        async function renderTool() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            
            if (!id) {
                window.location.href = '/';
                return;
            }

            try {
                const response = await fetch('/wp-json/wp/v2/posts/' + id);
                if (!response.ok) throw new Error('Tool not found');
                
                const post = await response.json();
                document.title = post.title.rendered + " | ToolForge AI";
                
                const renderArea = document.getElementById('tool-render-area');
                renderArea.innerHTML = post.content.rendered;
                
                const scripts = renderArea.getElementsByTagName('script');
                for (let i = 0; i < scripts.length; i++) {
                    const script = document.createElement('script');
                    if (scripts[i].src) {
                        script.src = scripts[i].src;
                        script.async = false;
                    } else {
                        script.textContent = scripts[i].textContent;
                    }
                    document.body.appendChild(script);
                }

                loadRelatedTools(id);

            } catch (error) {
                console.error(error);
                document.getElementById('tool-render-area').innerHTML = `
                    <div class="max-w-xl mx-auto p-12 bg-white border border-slate-200 rounded-2xl shadow-sm text-center">
                        <div class="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-6 text-red-500">
                            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        </div>
                        <h3 class="text-2xl font-bold text-slate-900 mb-2">ツールが見つかりません</h3>
                        <p class="text-slate-500 font-medium mb-8">お探しのツールは削除されたか、URLが間違っている可能性があります。</p>
                        <a href="/" class="inline-block px-8 py-4 bg-slate-900 text-white font-bold rounded-lg hover:bg-black transition-all">トップに戻る</a>
                    </div>
                `;
            }
        }

        async function loadRelatedTools(currentId) {
            try {
                const response = await fetch('/wp-json/wp/v2/posts?per_page=4');
                if (!response.ok) return;
                const posts = await response.json();
                
                const grid = document.getElementById('related-tools-grid');
                let count = 0;
                
                posts.forEach(post => {
                    if (post.id.toString() === currentId || count >= 3) return;
                    count++;
                    
                    const card = document.createElement('a');
                    card.href = `tool.html?id=${post.id}`;
                    card.className = "block bg-slate-50 border border-slate-100 p-6 rounded-2xl hover:bg-blue-50 hover:border-blue-100 transition-all group";
                    card.innerHTML = `
                        <h4 class="text-lg font-bold text-slate-900 mb-2 group-hover:text-blue-600 transition-colors">${post.title.rendered}</h4>
                        <div class="flex items-center text-xs font-bold uppercase tracking-widest text-slate-400 mt-4">
                            <span>ツールを開く</span>
                            <svg class="w-3 h-3 ml-1 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7-7 7"></path></svg>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                
                if (count > 0) {
                    document.getElementById('related-tools-area').classList.remove('hidden');
                }
            } catch (e) {
                console.error("Failed to load related tools", e);
            }
        }

        document.addEventListener('DOMContentLoaded', renderTool);
    </script>
</body>
</html>
